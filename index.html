<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup - Routine Influencer</title>
</head>

<body>

<div class="card">
    <h1>Sign in</h1>
    <h3>Enter into Routine Influencer</h3>

    <form action="Routine Influencer.html">

        <input type="text" name="username" placeholder="Enter Username" required>

        <input type="email" name="email" placeholder="Enter Email ID" required>

        <br>

        <button type="submit" class="submit-btn">Submit</button>
        <button type="reset" class="reset-btn">Reset</button>

    </form>
</div>

</body>
</html>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: #ff4d6d;
            margin-bottom: 5px;
        }

        h3 {
            color: #555;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            margin: 10px 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .submit-btn {
            background-color: #ff4d6d;
            color: white;
        }

        .reset-btn {
            background-color: #ccc;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
